<body>
<div class="top-bar"></div>

   <div class="logo">

</div>
    <nav>
        <a href="Home.html">Home</a>

        <a href="Artists.html">Artists</a>

<section class="hero">
    <div>
        <h1>Welcome to Akriti Real Voice</h1>
<p class="tagline">
    Where Every <span class="middle">NOTE</span> Tells a Story
</p>
        <a href="#songs" class="btn">Start Listening</a>

</section>

<div class="search-box">
    <input type="text" id="search" placeholder=" Search Songs..." onkeyup="searchSongs()">

<section class="song-list" id="songs">

    <div class="song">

            <img src="https://picsum.photos/200?random=1">
            <div>
                <h3>Dream Melody</h3>
                <p>Random Music</p>
            </div>
        </div>

        <audio id="song1">
            <source src="Raabta.mp3" type="audio/mpeg">
        </audio>

        <button class="play-btn" onclick="playSong('song1')">▶ Play</button>
    </div>

    <div class="song">
        <div class="song-info">
            <img src="https://picsum.photos/200?random=2">
            <div>
                <h3>Night Vibes</h3>
                <p>Lo-Fi Music</p>
            </div>
        </div>

        <audio id="song2">
            <source src="song2.mp3" type="audio/mpeg">
        </audio>

        <button class="play-btn" onclick="playSong('song2')">▶ Play</button>
    </div>

    <div class="song">
        <div class="song-info">
            <img src="https://picsum.photos/200?random=3">
            <div>
                <h3>Rock Energy</h3>
                <p>Rock Music</p>
            </div>
        </div>

        <audio id="song3">
            <source src="song3.mp3" type="audio/mpeg">
        </audio>

        <button class="play-btn" onclick="playSong('song3')">▶ Play</button>
    </div>

</section>
