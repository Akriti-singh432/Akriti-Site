<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundWave - Songs</title>

<link rel="stylesheet" href="Songpage.css">

</head>

<body>
<div class="top-bar"></div>
<header>
   <div class="logo">
    <img src="Logo2.jpg" alt="Logo" class="logoimg">
</div>
    <nav>
        <a href="Home.html">Home</a>
        <a href="Songpage.html">Songs</a>
        <a href="Artists.html">Artists</a>
        <a href="Albums.html">Albums</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h1>My Songs Collection</h1>
<p class="tagline">
   Feel the Music<span class="middle"> & </span> Feel the Melody
</p>
    </div>
</section>

<div class="search-box">
    <input type="text" id="search"
           placeholder="Search Songs..."
           onkeyup="searchSongs()">
</div>
<div class="song-container">
<section class="song-list" id="songs">
    <div class="song-card">
        <div class="song-left">
            <img src="raabta.jpg" alt="Raabta">

            <div class="song-info">
                <h2>Raabta</h2>
                <p>Movie: Agent Vinod</p>
            </div>
        </div>

        <audio controls>
            <source src="raabta.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="song-card">
        <div class="song-left">
            <img src="Tum hi ho.jpg" alt="Tum Hi Ho">

            <div class="song-info">
                <h2>Tum Hi Ho</h2>
                <p>Movie: ABCD</p>
            </div>
        </div>

        <audio controls>
            <source src="tumhiho.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="song-card">
        <div class="song-left">
            <img src="https://picsum.photos/200?random=3" alt="Kesariya">

            <div class="song-info">
                <h2>Kesariya</h2>
                <p>Movie: Brahmāstra</p>
            </div>
        </div>

        <audio controls>
            <source src="kesariya.mp3" type="audio/mpeg">
        </audio>
    </div>
</section>
</div>

<footer>
    <h3>Akriti Real Voice</h3>
    <p>Where Every Note Tells a Story </p>
    <p>© 2026 Akriti Real Voice. All Rights Reserved.</p>
</footer>

<script>
function searchSongs() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".song-card");

    cards.forEach(card => {
        let title = card.querySelector("h2").innerText.toLowerCase();

        if(title.includes(input)){
            card.style.display = "flex";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
