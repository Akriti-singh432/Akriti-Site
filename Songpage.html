<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundWave - Songs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0F172A;
    color:white;
}

/* Navbar */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#020617;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:32px;
    font-weight:700;
    background:linear-gradient(135deg,#8B5CF6,#EC4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}
nav a:hover{
    color:#EC4899;
}

/* Hero Section */
.hero{
    height:45vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#8B5CF6,#EC4899);
}

.hero h1{
    font-size:55px;
}

.hero p{
    margin-top:10px;
    font-size:18px;
}

/* Search */
.search-box{
    text-align:center;
    margin:40px 0;
}

.search-box input{
    width:60%;
    max-width:500px;
    padding:15px;
    border:none;
    border-radius:50px;
    background:#1E293B;
    color:white;
    outline:none;
}

/* Song Cards */
.song-container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

.song-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    transition:.3s;
}

.song-card:hover{
    transform:translateY(-5px);
}

.song-left{
    display:flex;
    align-items:center;
}

.song-left img{
    width:90px;
    height:90px;
    border-radius:15px;
    margin-right:15px;
    object-fit:cover;
}

.song-info h2{
    margin-bottom:5px;
}

.song-info p{
    color:#CBD5E1;
}

audio{
    width:300px;
}

/* Footer */
footer{
    margin-top:50px;
    text-align:center;
    padding:25px;
    background:#020617;
}

@media(max-width:768px){

    .song-card{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }

    .song-left{
        flex-direction:column;
    }

    .song-left img{
        margin-right:0;
        margin-bottom:10px;
    }

    nav{
        display:none;
    }

    .hero h1{
        font-size:35px;
    }

    audio{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">🎵 SoundWave</div>

    <nav>
        <a href="Home.html">Home</a>
        <a href="Songpage.html">Songs</a>
        <a href="Artists.html">Artists</a>
        <a href="Albums.html">Albums</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h1>Voice Findout</h1>
        <p>Listen to your favorite songs anytime, anywhere.</p>
    </div>
</section>

<div class="search-box">
    <input type="text" id="search" placeholder="🔍 Search Songs..." onkeyup="searchSongs()">
</div>

<div class="song-container">

    <div class="song-card">
        <div class="song-left">
            <a href="Mahadev.html" target="_blank">
    <img src="Raabta.jpg" alt="Raabta Song">
</a>
            <div class="song-info">
                
                <h2>Raabta</h2>
                <p>Movie: Agent Vinod</p>
            </div>
        </div>

        <audio controls>
            <source src="Raabta.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="song-card">
        <div class="song-left">
            <img src="Tum hi ho.jpg">
            <div class="song-info">
                <h2>Tum Hi Ho</h2>
                <p>Movie: ABCD</p>
            </div>
        </div>

        <audio controls>
            <source src="tumhiho.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="song-card">
        <div class="song-left">
            <img src="https://picsum.photos/200?random=3">
            <div class="song-info">
                <h2>Kesariya</h2>
                <p>Movie: Brahmāstra</p>
            </div>
        </div>

        <audio controls>
            <source src="kesariya.mp3" type="audio/mpeg">
        </audio>
    </div>

</div>

<footer>
    © 2026 SoundWave Music Platform <br>
</footer>

<script>
function searchSongs() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".song-card");

    cards.forEach(card => {
        let title = card.querySelector("h2").innerText.toLowerCase();

        if(title.includes(input)){
            card.style.display = "flex";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
