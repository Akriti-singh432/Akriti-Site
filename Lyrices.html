<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raabta Lyrices</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Poppins, sans-serif;
}

/* 🎥 Background */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(7px) brightness(0.45);
    transform:scale(1.2);
    transition: opacity 1s ease-in-out;
}

/* overlay for cinematic look */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
}

/* 🎤 Caption */
.caption{
    position:absolute;
    width:100%;
    top:42%;
    text-align:center;
    color:white;
    font-size:34px;
    font-weight:bold;
    text-shadow:0 0 15px black;
    animation:pop 0.6s ease-in-out;
}

@keyframes pop{
    0%{transform:scale(0.8);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

/* ✨ Glow */
.glow{
    position:absolute;
    width:100%;
    top:42%;
    text-align:center;
    color:yellow;
    font-size:36px;
    font-weight:bold;
    filter:blur(10px);
    opacity:0.4;
}


@keyframes wave{
    0%,100%{height:10px;opacity:0.5;}
    50%{height:60px;opacity:1;}
}

/* Title */
.title{
    position:absolute;
    top:8%;
    width:100%;
    text-align:center;
    color:gold;
    font-size:18px;
    letter-spacing:2px;
}
</style>
</head>

<body>

<!-- 🎥 Background Image -->
<img class="bg" id="bg" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<div class="overlay"></div>

<div class="title">🎵 Listion this Song</div>

<div class="glow" id="glow"> 💖Raabta</div>
<div class="caption" id="caption"> 💖Raabta</div>

<!-- Waveform -->


<audio id="audio" autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* 🎬 Lyrics */
let lyrics = [
    "🙏Kuch to hai tujhse RAABTA --2 ",
    "💖Kahte hai khuda ne is ",
    "🔥 Jaha me sabhi ke liye",
    "🌸Kisi na kisi ko hai",
    "✨ Banaya hai kisi ke liye --2 "
];

/* 🖼️ RANDOM BACKGROUND IMAGES */
let images = [
    "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
    "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
    "https://images.unsplash.com/photo-1493246507139-91e8fad9978e",
    "https://images.unsplash.com/photo-1472214103451-9374bd1c798e",
    "https://images.unsplash.com/photo-1469474968028-56623f02e42e",
    "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
];

let i = 0;

/* 🎤 Lyrics change */
function changeText(){
    i = (i + 1) % lyrics.length;

    let text = lyrics[i];

    document.getElementById("caption").innerText = text;
    document.getElementById("glow").innerText = text;

    document.querySelector(".caption").style.animation = "none";
    void document.querySelector(".caption").offsetWidth;
    document.querySelector(".caption").style.animation = "pop 0.6s ease-in-out";
}

/* 🖼️ Background change */
let j = 0;
function changeBg(){
    j = (j + 1) % images.length;

    let bg = document.getElementById("bg");

    bg.style.opacity = 0;

    setTimeout(()=>{
        bg.src = images[j];
        bg.style.opacity = 1;
    }, 500);
}

/* ⏱️ TIMERS */
setInterval(changeText, 2200);   // beat sync text
setInterval(changeBg, 4000);     // background random change

</script>

</body>
</html>
